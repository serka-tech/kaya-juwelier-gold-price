<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaya Juwelier – Görsel Yönetimi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }
    h1 { color: #d4af37; font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    .card {
      background: #252540;
      border: 1px solid #333360;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 14px; color: #d4af37; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px;
      background: #1a1a2e; border: 1px solid #444;
      border-radius: 8px; color: #fff; font-size: 14px;
      outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #d4af37; }
    .row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .asset-label { flex: 1; min-width: 140px; font-size: 13px; color: #ccc; }
    .preview {
      width: 52px; height: 52px; border-radius: 8px;
      background: #1a1a2e; border: 1px solid #444;
      object-fit: cover; display: block;
    }
    .preview-placeholder {
      width: 52px; height: 52px; border-radius: 8px;
      background: #1a1a2e; border: 1px dashed #555;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 20px; flex-shrink: 0;
    }
    input[type="file"] { display: none; }
    .pick-btn {
      padding: 8px 16px; background: transparent;
      border: 1px solid #d4af37; border-radius: 8px;
      color: #d4af37; font-size: 13px; cursor: pointer;
      white-space: nowrap;
    }
    .pick-btn:hover { background: rgba(212,175,55,0.1); }
    .status { font-size: 12px; flex: 1; min-width: 100px; }
    .status.ok   { color: #4caf50; }
    .status.err  { color: #e53935; }
    .status.busy { color: #d4af37; }
    .divider { border: none; border-top: 1px solid #333; margin: 16px 0; }
    #loginStatus { font-size: 13px; margin-top: 8px; }
    #loginStatus.ok  { color: #4caf50; }
    #loginStatus.err { color: #e53935; }
    .section-title {
      font-size: 11px; font-weight: 700; color: #888;
      letter-spacing: 1.1px; text-transform: uppercase;
      margin: 16px 0 8px;
    }
  </style>
</head>
<body>

<h1>JUWELIER KAYA</h1>
<p class="subtitle">Görsel Yönetim Paneli</p>

<!-- Login -->
<div class="card">
  <h2>Giriş</h2>
  <label>Admin Token</label>
  <input type="password" id="tokenInput" placeholder="JWT token yapıştırın...">
  <div id="loginStatus"></div>
</div>

<!-- Logo -->
<div class="card">
  <h2>Logo</h2>
  <div class="row">
    <div id="logoPreviewWrap" class="preview-placeholder">🖼</div>
    <span class="asset-label">Uygulama Logosu</span>
    <label class="pick-btn" for="logoFile">Dosya Seç</label>
    <input type="file" id="logoFile" accept="image/*">
    <span class="status" id="logoStatus"></span>
  </div>
</div>

<!-- Assets -->
<div class="card">
  <h2>Altın Görselleri</h2>
  <div id="assetList"></div>
</div>

<script>
const API = (window._API_BASE_URL || '').replace(/\/$/, '');

const ASSETS = [
  { key: '24K',           label: '24 Ayar Altın' },
  { key: '22K',           label: '22 Ayar Altın' },
  { key: '21K',           label: '21 Ayar Altın' },
  { key: '18K',           label: '18 Ayar Altın' },
  { key: 'troy',          label: 'Troy Ons' },
  { key: 'ceyrek_altin',  label: 'Çeyrek Altın' },
  { key: 'yarim_altin',   label: 'Yarım Altın' },
  { key: 'tam_altin',     label: 'Tam Altın' },
  { key: 'gremse_altin',  label: 'Gremse Altın' },
  { key: 'besli_altin',   label: 'Beşli Altın' },
  { key: 'ceyrek_resat',  label: 'Çeyrek Reşat' },
  { key: 'yarim_resat',   label: 'Yarım Reşat' },
  { key: 'tam_resat',     label: 'Tam Reşat' },
  { key: 'iki5_resat',    label: '2.5 Reşat' },
  { key: 'besli_resat',   label: 'Beşli Reşat' },
  { key: 'burma',         label: 'Burma Bilezik' },
  { key: 'ajda',          label: 'Ajda Bilezik' },
];

function getToken() { return document.getElementById('tokenInput').value.trim(); }

// ── Build asset rows ──────────────────────────────────────────────────────────
const list = document.getElementById('assetList');
ASSETS.forEach(asset => {
  const row = document.createElement('div');
  row.className = 'row';
  row.id = 'row_' + asset.key;
  row.innerHTML = `
    <div class="preview-placeholder" id="prev_${asset.key}">🥇</div>
    <span class="asset-label">${asset.label}</span>
    <label class="pick-btn" for="file_${asset.key}">Dosya Seç</label>
    <input type="file" id="file_${asset.key}" accept="image/*">
    <span class="status" id="st_${asset.key}"></span>
  `;
  list.appendChild(row);
  document.getElementById('file_' + asset.key).addEventListener('change', () => uploadAsset(asset.key));
});

// ── Load manifest to show existing previews ───────────────────────────────────
async function loadManifest() {
  try {
    const res = await fetch(API + '/api/upload/manifest', {
      headers: { 'ngrok-skip-browser-warning': 'true' }
    });
    if (!res.ok) return;
    const data = await res.json();
    // Logo
    if (data.logo) {
      const ts = encodeURIComponent(data.logo);
      const wrap = document.getElementById('logoPreviewWrap');
      wrap.outerHTML = `<img class="preview" id="logoPreviewWrap" src="${API}/api/upload/image/logo?v=${ts}">`;
    }
    // Assets
    ASSETS.forEach(a => {
      if (data[a.key]) {
        const ts = encodeURIComponent(data[a.key]);
        const el = document.getElementById('prev_' + a.key);
        if (el) el.outerHTML = `<img class="preview" id="prev_${a.key}" src="${API}/api/upload/image/${a.key}?v=${ts}">`;
      }
    });
  } catch(e) {}
}

// ── Upload helpers ────────────────────────────────────────────────────────────
async function upload(url, file, statusEl, previewId) {
  const token = getToken();
  if (!token) {
    setStatus(statusEl, 'Önce token girin!', 'err'); return;
  }
  setStatus(statusEl, 'Yükleniyor...', 'busy');
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'ngrok-skip-browser-warning': 'true'
      },
      body: form
    });
    if (res.ok) {
      setStatus(statusEl, '✓ Güncellendi', 'ok');
      // Update preview
      const ts = encodeURIComponent(new Date().toISOString());
      const imgUrl = `${API}/api/upload/image/${previewId}?v=${ts}`;
      const el = document.getElementById('prev_' + previewId) || document.getElementById('logoPreviewWrap');
      if (el) {
        const img = document.createElement('img');
        img.className = 'preview';
        img.id = el.id;
        img.src = imgUrl;
        el.replaceWith(img);
      }
    } else {
      const body = await res.text();
      setStatus(statusEl, 'Hata: ' + res.status, 'err');
    }
  } catch(e) {
    setStatus(statusEl, 'Bağlantı hatası', 'err');
  }
}

function setStatus(el, msg, cls) {
  el.textContent = msg;
  el.className = 'status ' + cls;
}

// ── Logo upload ───────────────────────────────────────────────────────────────
document.getElementById('logoFile').addEventListener('change', () => {
  const file = document.getElementById('logoFile').files[0];
  if (!file) return;
  upload(API + '/api/upload/logo', file, document.getElementById('logoStatus'), 'logo');
});

// ── Asset upload ──────────────────────────────────────────────────────────────
function uploadAsset(key) {
  const file = document.getElementById('file_' + key).files[0];
  if (!file) return;
  upload(API + '/api/upload/asset/' + key, file, document.getElementById('st_' + key), key);
}

// ── On load ───────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Inject API base URL from Flutter build constant (if available)
  // Fallback: same origin
  if (!API) {
    const s = document.createElement('script');
    s.textContent = 'window._API_BASE_URL = window.location.origin;';
    document.head.prepend(s);
    location.reload();
  }
  loadManifest();
});
</script>

<!-- Inject API URL from build-time constant -->
<script>
  // This gets the ngrok URL baked in at build time via flutter_bootstrap.js
  // Fallback to same origin if not set
  if (!window._API_BASE_URL) {
    window._API_BASE_URL = window.location.origin;
  }
</script>

</body>
</html>
